<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <title>ديوان جابر العتيبي</title>

            // بعدها يطلع له المقلب
            alert("تم تهكير جهازك هههههههههههههههههههههههههههههههههههههه");
        }
