<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ديوان جابر العتيبي</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f1ea; color: #333; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #8b5a2b; border-bottom: 2px solid #8b5a2b; display: inline-block; padding-bottom: 10px; }
        .diwan-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 20px auto; }
        .poem-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; }
        .poem-card:hover { transform: translateY(-5px); }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-title { padding: 15px; margin: 0; color: #4a3525; }
    </style>
</head>
<body>

    <h1>ديوان جابر العتيبي</h1>
    <p>اختر قصيدة لقراءتها</p>

    <div class="diwan-grid">
        
        <!-- القصيدة الأولى -->
        <div class="poem-card" onclick="alert('الوضح دايم لها في القلب منزاله\nتطرب خفوقي لا لاحت لي مبانيها\n\nتسبق طموح البشر في كل مجاله\nيا جعل عيني فداها في تواليها')">
            <img src="https://i.ibb.co/PG6VVVNd/IMG-2997.jpg" class="card-img">
            <h3 class="card-title">فخر الوضح</h3>
        </div>

        <!-- القصيدة الثانية -->
        <div class="poem-card" onclick="alert('يا راكب اللي يقطع البيد مسرور\nيشبه لنجمٍ في سما الليل ساري\n\nما هاب من قفرٍ ولا هاب من جور\nيمشي على وضح النقى باختياري')">
            <img src="https://i.ibb.co/PG6VVVNd/IMG-2997.jpg" class="card-img">
            <h3 class="card-title">وصف المطية</h3>
        </div>

        <!-- القصيدة الثالثة -->
        <div class="poem-card" onclick="alert('العز في شوفت النشامى يحيين\nفي مجلسٍ يطرب له البال والراس\n\nأهل الوفا والطيب دايم عزيزين\nوالمرجله فيهم لها ساس وعماس')">
            <img src="https://i.ibb.co/PG6VVVNd/IMG-2997.jpg" class="card-img">
            <h3 class="card-title">مجلس الرجال</h3>
        </div>

    </div>

</body>
</html>
